name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      # mypy は pyproject の python_version（= サポート最古）として解析するので，
      # 実行する処理系は 1 つで足りる．
      - run: pip install -e ".[dev]"
      - run: mypy

  generate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 下限は pyproject の requires-python，上限は開発機の版．
        python-version: ["3.11", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e .
      # mypy が通ることと実際に動くことは別（#32 では cli.py の future import 欠落を
      # 実行側だけが捕まえた）．import 確認に留めず生成まで通し，出力も検査する．
      - run: md2pptx example.md --theme OfficeTheme.pptx -o out.pptx
      - name: Check the deck was produced as expected
        run: |
          python - <<'PY'
          from pptx import Presentation
          p = Presentation("out.pptx")
          notes = sum(
              1 for s in p.slides
              if s.has_notes_slide and s.notes_slide.notes_text_frame.text.strip()
          )
          print(f"slides={len(p.slides)} slides_with_notes={notes}")
          assert len(p.slides) == 14, f"expected 14 slides, got {len(p.slides)}"
          assert notes == 2, f"expected 2 slides with notes, got {notes}"
          PY
      - name: Self-check the parser debug harness
        run: python -m md2pptx.parser

  # Only the LibreOffice backend is testable here — PowerPoint is not on the
  # runner. LibreOffice is a heavy apt install, so this is its own job rather
  # than part of the generate matrix, and runs on one interpreter.
  pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: sudo apt-get update && sudo apt-get install -y libreoffice-impress
      - run: pip install -e .
      - run: md2pptx example.md --theme OfficeTheme.pptx -o out.pptx --pdf out.pdf --pdf-converter libreoffice
      - name: Check the PDF was produced with the expected page count
        run: |
          sudo apt-get install -y poppler-utils
          test -f out.pdf
          pages=$(pdfinfo out.pdf | awk '/^Pages/{print $2}')
          echo "pages=$pages"
          test "$pages" = "14"
